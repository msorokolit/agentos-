# Root pyproject — holds tool config (ruff, mypy, pytest) shared across services.
# Each service ships its own pyproject for runtime/build deps.

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    ".venv",
    "build",
    "dist",
    "migrations/versions",
    "web-ui",
    "node_modules",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "RUF",
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults (FastAPI Depends)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
ignore_missing_imports = true
follow_imports = "silent"
namespace_packages = true
explicit_package_bases = true
exclude = [
    "build/",
    "dist/",
    ".venv/",
    "migrations/",
]

[tool.pytest.ini_options]
addopts = "-ra --strict-markers"
testpaths = ["services"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore::DeprecationWarning:pydantic.*",
]
