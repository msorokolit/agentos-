name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  id-token: write   # cosign keyless signing via OIDC

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # -------------------------------------------------------------------------
  # Per-service container image. We use a matrix so each service is built,
  # signed, and SBOM'd independently and published in parallel.
  # -------------------------------------------------------------------------
  images:
    name: Build, sign, SBOM
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { pkg: api_gateway,   name: api-gateway,   module: api_gateway.main:app }
          - { pkg: agent_runtime, name: agent-runtime, module: agent_runtime.main:app }
          - { pkg: llm_gateway,   name: llm-gateway,   module: llm_gateway.main:app }
          - { pkg: tool_registry, name: tool-registry, module: tool_registry.main:app }
          - { pkg: knowledge_svc, name: knowledge-svc, module: knowledge_svc.main:app }
          - { pkg: memory_svc,    name: memory-svc,    module: memory_svc.main:app }
          - { pkg: worker,        name: worker,        module: worker.main:app }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest
          build-args: |
            SERVICE_PKG=${{ matrix.service.pkg }}
            SERVICE_MODULE=${{ matrix.service.module }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Sign image (keyless, OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          SERVICE: ${{ matrix.service.name }}
        run: |
          cosign sign --yes "${IMAGE_PREFIX}/${SERVICE}@${DIGEST}"

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ steps.ver.outputs.version }}
          output-file: sbom-${{ matrix.service.name }}-${{ steps.ver.outputs.version }}.spdx.json

      - name: Attest SBOM (cosign)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate "sbom-${SERVICE}-${VERSION}.spdx.json" \
            --type spdxjson \
            "${IMAGE_PREFIX}/${SERVICE}@${DIGEST}"
        env:
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          SERVICE: ${{ matrix.service.name }}
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ steps.ver.outputs.version }}
          format: sarif
          output: trivy-${{ matrix.service.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # report-only on initial release; tighten later

      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service.name }}
          path: trivy-${{ matrix.service.name }}.sarif

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service.name }}
          path: sbom-${{ matrix.service.name }}-${{ steps.ver.outputs.version }}.spdx.json

  # -------------------------------------------------------------------------
  # Web UI (Next.js standalone build)
  # -------------------------------------------------------------------------
  web-ui-image:
    name: Web UI image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: web-ui
          file: web-ui/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/web-ui:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/web-ui:latest

  # -------------------------------------------------------------------------
  # Helm chart packaging + GH-pages style publishing as a release asset.
  # -------------------------------------------------------------------------
  helm:
    name: Package Helm chart
    runs-on: ubuntu-latest
    needs: [images]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.1
      - name: Set version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - run: |
          helm lint deploy/helm/agenticos
          helm package deploy/helm/agenticos \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}" \
            --destination /tmp/charts
      - name: Upload chart
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: /tmp/charts/agenticos-*.tgz
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/charts/agenticos-*.tgz
          generate_release_notes: true
