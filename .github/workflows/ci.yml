name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install services
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ./services/shared
          for svc in api_gateway agent_runtime llm_gateway tool_registry knowledge_svc memory_svc worker; do
            pip install -e ./services/$svc
          done
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check services/ scripts/

      - name: Ruff format check
        run: ruff format --check services/ scripts/

      - name: Pytest
        run: pytest services/ -q --cov=services --cov-report=xml

      - name: Validate Alembic migration generates SQL
        env:
          DATABASE_URL: postgresql+psycopg://x:x@localhost:5432/x
        run: alembic upgrade head --sql > /tmp/upgrade.sql && [ -s /tmp/upgrade.sql ]

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  web:
    name: Web UI typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  sdk-ts:
    name: TypeScript SDK typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript/agenticos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck

  compose-validate:
    name: Compose syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config -q

  helm-validate:
    name: Helm chart lint + render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.1
      - run: helm lint deploy/helm/agenticos
      - run: helm template agenticos deploy/helm/agenticos > /tmp/render.yaml
      - run: test -s /tmp/render.yaml
