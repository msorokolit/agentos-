name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install services
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ./services/shared
          for svc in api_gateway agent_runtime llm_gateway tool_registry knowledge_svc memory_svc worker; do
            pip install -e ./services/$svc
          done
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check services/ scripts/ tests/ sdk/python/agenticos/

      - name: Ruff format check
        run: ruff format --check services/ scripts/ tests/ sdk/python/agenticos/

      - name: Pytest (unit)
        run: pytest services/ -q --cov=services --cov-report=xml

      - name: Pytest (integration, in-process)
        run: pytest tests/integration -q

      - name: Pytest (eval scorer)
        run: pytest tests/evals -q

      - name: Pytest (Python SDK)
        run: |
          pip install -e ./sdk/python/agenticos
          pytest sdk/python/agenticos/tests -q

      - name: Validate Alembic migration generates SQL
        env:
          DATABASE_URL: postgresql+psycopg://x:x@localhost:5432/x
        run: alembic upgrade head --sql > /tmp/upgrade.sql && [ -s /tmp/upgrade.sql ]

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  web:
    name: Web UI typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  sdk-ts:
    name: TypeScript SDK typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript/agenticos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck

  compose-validate:
    name: Compose syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config -q

  helm-validate:
    name: Helm chart lint + render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.1
      - run: helm lint deploy/helm/agenticos
      - run: helm template agenticos deploy/helm/agenticos > /tmp/render.yaml
      - run: test -s /tmp/render.yaml

  semgrep:
    name: Semgrep (security + best-practice rulesets)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        env:
          SEMGREP_RULES: >
            p/python
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/react
            p/dockerfile
            p/ci
        run: |
          semgrep --metrics=off --error \
            --severity ERROR \
            --severity WARNING \
            --exclude tests/e2e/node_modules \
            --exclude web-ui/node_modules \
            --sarif --output /tmp/semgrep.sarif || true
          # Fail only on ERROR-severity findings; report WARNINGs.
          semgrep --metrics=off --severity ERROR \
            --exclude tests/e2e/node_modules \
            --exclude web-ui/node_modules
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: /tmp/semgrep.sarif
          if-no-files-found: ignore

  security:
    name: Security scans (pip-audit, bandit, openapi snapshot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install services
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ./services/shared
          for svc in api_gateway agent_runtime llm_gateway tool_registry knowledge_svc memory_svc worker; do
            pip install -e ./services/$svc
          done
          pip install -r requirements-dev.txt
          pip install bandit[toml]==1.7.10 pip-audit==2.7.3

      - name: Bandit (high+medium)
        run: bandit -r services/ -ll -ii -q --skip B101,B110,B112

      - name: pip-audit (vulnerability scan, ignore unfixed)
        run: pip-audit --strict --ignore-vuln GHSA-x  # the placeholder ignore is harmless
        continue-on-error: true   # report-only on first pass; tighten later

      - name: Generate + upload OpenAPI snapshots
        run: python -m scripts.openapi_snapshot /tmp/openapi

      - uses: actions/upload-artifact@v4
        with:
          name: openapi-snapshots
          path: /tmp/openapi/

      - name: OpenAPI diff vs. main (PR only)
        if: github.event_name == 'pull_request'
        run: |
          set +e
          git fetch origin main:main || exit 0
          rm -rf /tmp/wt-main
          git worktree add /tmp/wt-main main || exit 0
          (cd /tmp/wt-main && python -m scripts.openapi_snapshot /tmp/openapi-main) || true
          for f in /tmp/openapi/*.json; do
            base="$(basename "$f")"
            if [ -f "/tmp/openapi-main/$base" ]; then
              echo "::group::diff $base"
              diff -u "/tmp/openapi-main/$base" "$f" || true
              echo "::endgroup::"
            fi
          done
