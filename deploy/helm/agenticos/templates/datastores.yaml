{{- if not .Values.postgres.external -}}
apiVersion: v1
kind: Service
metadata:
  name: agenticos-postgres
  labels: {{- include "agenticos.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: postgres
  ports: [{name: pg, port: 5432, targetPort: pg}]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agenticos-postgres
  labels: {{- include "agenticos.labels" . | nindent 4 }}
spec:
  serviceName: agenticos-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels: {{- include "agenticos.labels" . | nindent 8 }}
        app.kubernetes.io/name: postgres
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgres.image }}
        env:
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom: { secretKeyRef: { name: agenticos-secrets, key: POSTGRES_PASSWORD } }
        ports: [{name: pg, containerPort: 5432}]
        volumeMounts:
        - { name: data, mountPath: /var/lib/postgresql/data }
        readinessProbe:
          exec: { command: ["pg_isready", "-U", "{{ .Values.postgres.user }}"] }
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata: { name: data }
    spec:
      accessModes: ["ReadWriteOnce"]
      {{- if .Values.global.storageClassName }}
      storageClassName: {{ .Values.global.storageClassName | quote }}
      {{- end }}
      resources: { requests: { storage: {{ .Values.postgres.storage }} } }
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: agenticos-redis
  labels: {{- include "agenticos.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: redis
  ports: [{name: redis, port: 6379, targetPort: redis}]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agenticos-redis
  labels: {{- include "agenticos.labels" . | nindent 4 }}
spec:
  serviceName: agenticos-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels: {{- include "agenticos.labels" . | nindent 8 }}
        app.kubernetes.io/name: redis
    spec:
      containers:
      - name: redis
        image: {{ .Values.redis.image }}
        ports: [{name: redis, containerPort: 6379}]
        volumeMounts: [{name: data, mountPath: /data}]
  volumeClaimTemplates:
  - metadata: { name: data }
    spec:
      accessModes: ["ReadWriteOnce"]
      {{- if .Values.global.storageClassName }}
      storageClassName: {{ .Values.global.storageClassName | quote }}
      {{- end }}
      resources: { requests: { storage: {{ .Values.redis.storage }} } }
---
apiVersion: v1
kind: Service
metadata:
  name: agenticos-nats
  labels: {{- include "agenticos.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: nats
  ports: [{name: nats, port: 4222, targetPort: nats}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agenticos-nats
  labels: {{- include "agenticos.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels: {{- include "agenticos.labels" . | nindent 8 }}
        app.kubernetes.io/name: nats
    spec:
      containers:
      - name: nats
        image: {{ .Values.nats.image }}
        args: ["-js", "-sd", "/data"]
        ports: [{name: nats, containerPort: 4222}]
{{- if .Values.minio.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: agenticos-minio
  labels: {{- include "agenticos.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: minio
  ports:
    - {name: s3, port: 9000, targetPort: s3}
    - {name: console, port: 9001, targetPort: console}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agenticos-minio
  labels: {{- include "agenticos.labels" . | nindent 4 }}
spec:
  serviceName: agenticos-minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels: {{- include "agenticos.labels" . | nindent 8 }}
        app.kubernetes.io/name: minio
    spec:
      containers:
      - name: minio
        image: {{ .Values.minio.image }}
        args: ["server", "/data", "--console-address", ":9001"]
        env:
        - name: MINIO_ROOT_USER
          value: {{ .Values.minio.accessKey | quote }}
        - name: MINIO_ROOT_PASSWORD
          valueFrom: { secretKeyRef: { name: agenticos-secrets, key: S3_SECRET_KEY } }
        ports:
          - {name: s3, containerPort: 9000}
          - {name: console, containerPort: 9001}
        volumeMounts: [{name: data, mountPath: /data}]
  volumeClaimTemplates:
  - metadata: { name: data }
    spec:
      accessModes: ["ReadWriteOnce"]
      resources: { requests: { storage: {{ .Values.minio.storage }} } }
{{- end -}}
{{- if .Values.opa.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: agenticos-opa
  labels: {{- include "agenticos.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: opa
  ports: [{name: opa, port: 8181, targetPort: opa}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agenticos-opa
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: opa
  template:
    metadata:
      labels: {{- include "agenticos.labels" . | nindent 8 }}
        app.kubernetes.io/name: opa
    spec:
      containers:
      - name: opa
        image: {{ .Values.opa.image }}
        args: ["run", "--server", "--addr=0.0.0.0:8181"]
        ports: [{name: opa, containerPort: 8181}]
{{- end -}}
{{- if .Values.ollama.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: agenticos-ollama
  labels: {{- include "agenticos.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: ollama
  ports: [{name: http, port: 11434, targetPort: http}]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agenticos-ollama
spec:
  serviceName: agenticos-ollama
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels: {{- include "agenticos.labels" . | nindent 8 }}
        app.kubernetes.io/name: ollama
    spec:
      containers:
      - name: ollama
        image: {{ .Values.ollama.image }}
        ports: [{name: http, containerPort: 11434}]
        resources: {{- toYaml .Values.ollama.resources | nindent 10 }}
        volumeMounts: [{name: models, mountPath: /root/.ollama}]
  volumeClaimTemplates:
  - metadata: { name: models }
    spec:
      accessModes: ["ReadWriteOnce"]
      resources: { requests: { storage: {{ .Values.ollama.storage }} } }
{{- end -}}
