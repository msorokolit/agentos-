apiVersion: v1
kind: ConfigMap
metadata:
  name: agenticos-env
  labels: {{- include "agenticos.labels" . | nindent 4 }}
data:
  AGENTICOS_ENV: {{ .Values.env | quote }}
  AGENTICOS_LOG_LEVEL: "INFO"
  DATABASE_URL: {{ .Values.postgres.url | quote }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  NATS_URL: {{ .Values.nats.url | quote }}
  S3_ENDPOINT: {{ .Values.minio.endpoint | quote }}
  S3_ACCESS_KEY: {{ .Values.minio.accessKey | quote }}
  S3_BUCKET: {{ .Values.minio.bucket | quote }}
  OIDC_ISSUER: {{ .Values.oidc.issuer | quote }}
  OIDC_CLIENT_ID: {{ .Values.oidc.clientId | quote }}
  OIDC_REDIRECT_URI: {{ .Values.oidc.redirectUri | quote }}
  OLLAMA_URL: {{ .Values.ollama.url | quote }}
  OPA_URL: {{ .Values.opa.url | quote }}
  LLM_GATEWAY_URL: "http://agenticos-llm-gateway:{{ .Values.services.llmGateway.port }}"
  TOOL_REGISTRY_URL: "http://agenticos-tool-registry:{{ .Values.services.toolRegistry.port }}"
  KNOWLEDGE_SVC_URL: "http://agenticos-knowledge-svc:{{ .Values.services.knowledgeSvc.port }}"
  AGENT_RUNTIME_URL: "http://agenticos-agent-runtime:{{ .Values.services.agentRuntime.port }}"
  EMBED_DIM: {{ .Values.embedDim | quote }}
