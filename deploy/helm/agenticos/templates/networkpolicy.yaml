apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agenticos-internal-only
  labels: {{- include "agenticos.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: agenticos
  policyTypes: [Ingress]
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: agenticos
  - from:                       # allow ingress controller -> api-gateway / web-ui
    - namespaceSelector: {}
    ports:
    - port: 8080
    - port: 3000
