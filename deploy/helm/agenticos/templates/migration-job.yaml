apiVersion: batch/v1
kind: Job
metadata:
  name: agenticos-migrate-{{ .Release.Revision }}
  labels: {{- include "agenticos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels: {{- include "agenticos.labels" . | nindent 8 }}
        app.kubernetes.io/name: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: migrate
        image: {{ include "agenticos.image" (dict "Values" .Values "image" .Values.services.apiGateway.image) }}
        command: ["alembic", "upgrade", "head"]
        envFrom:
        - configMapRef: { name: agenticos-env }
        - secretRef:    { name: agenticos-secrets }
