apiVersion: v1
kind: Secret
metadata:
  name: agenticos-secrets
  labels: {{- include "agenticos.labels" . | nindent 4 }}
type: Opaque
stringData:
  AGENTICOS_SECRET_KEY: {{ .Values.secretKey | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.oidc.clientSecret | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  S3_SECRET_KEY: {{ .Values.minio.secretKey | quote }}
