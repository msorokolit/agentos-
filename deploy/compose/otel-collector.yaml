receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

exporters:
  debug:
    verbosity: basic
  # Add tempo/jaeger/loki exporters here in v1.5

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [debug]
    metrics:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [debug]
    logs:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [debug]
