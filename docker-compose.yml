# AgenticOS — local development stack.
# Usage: `make dev` (or `docker compose up -d --build`).

name: agenticos

x-common-env: &common-env
  AGENTICOS_ENV: ${AGENTICOS_ENV:-development}
  AGENTICOS_LOG_LEVEL: ${AGENTICOS_LOG_LEVEL:-INFO}
  AGENTICOS_SECRET_KEY: ${AGENTICOS_SECRET_KEY:-dev-only-secret-change-me-please-32bytes!}
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-agenticos}:${POSTGRES_PASSWORD:-agenticos}@postgres:5432/${POSTGRES_DB:-agenticos}
  REDIS_URL: redis://redis:6379/0
  NATS_URL: nats://nats:4222
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-agenticos}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-agenticos-minio}
  S3_BUCKET: ${S3_BUCKET:-agenticos}
  OIDC_ISSUER: ${OIDC_ISSUER:-http://keycloak:8080/realms/agenticos}
  OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-agenticos-web}
  OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-dev-client-secret}
  OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8080/api/v1/auth/oidc/callback}
  OLLAMA_URL: http://ollama:11434
  OPA_URL: http://opa:8181
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  EMBED_DIM: ${EMBED_DIM:-768}

x-svc-defaults: &svc-defaults
  restart: unless-stopped
  networks: [agenticos]
  depends_on:
    postgres: { condition: service_healthy }
    redis:    { condition: service_healthy }
    nats:     { condition: service_started }

services:
  # ---------- Datastores ----------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks: [agenticos]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agenticos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenticos}
      POSTGRES_DB: ${POSTGRES_DB:-agenticos}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenticos} -d ${POSTGRES_DB:-agenticos}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [agenticos]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [agenticos]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-agenticos}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-agenticos-minio}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports: ["9000:9000", "9001:9001"]

  minio-init:
    image: minio/mc:latest
    networks: [agenticos]
    depends_on:
      minio: { condition: service_healthy }
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-agenticos}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-agenticos-minio}
      S3_BUCKET: ${S3_BUCKET:-agenticos}
      S3_DOCUMENT_TTL_DAYS: ${S3_DOCUMENT_TTL_DAYS:-365}
      S3_NONCURRENT_TTL_DAYS: ${S3_NONCURRENT_TTL_DAYS:-7}
    entrypoint: ["/bin/sh", "/init/minio-init.sh"]
    volumes:
      - ./deploy/compose/minio-init.sh:/init/minio-init.sh:ro
    restart: "no"

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    networks: [agenticos]
    command: ["-js", "-sd", "/data"]
    volumes:
      - nats-data:/data
    ports: ["4222:4222", "8222:8222"]

  # ---------- AuthN (dev only) ----------
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    restart: unless-stopped
    networks: [agenticos]
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./deploy/compose/keycloak:/opt/keycloak/data/import:ro
    ports: ["8090:8080"]

  # ---------- Policy ----------
  opa:
    image: openpolicyagent/opa:0.68.0
    restart: unless-stopped
    networks: [agenticos]
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ./policies:/policies:ro
    ports: ["8181:8181"]

  # ---------- LLM ----------
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks: [agenticos]
    volumes:
      - ollama-data:/root/.ollama
    ports: ["11434:11434"]
    # GPU users: uncomment the deploy section in deploy/compose/gpu.yml override.

  # ---------- Observability ----------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    restart: unless-stopped
    networks: [agenticos]
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./deploy/compose/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports: ["4317:4317", "4318:4318"]

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    networks: [agenticos]
    volumes:
      - ./deploy/compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/compose/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
    ports: ["9090:9090"]

  loki:
    image: grafana/loki:3.2.0
    restart: unless-stopped
    networks: [agenticos]
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./deploy/compose/loki-config.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports: ["3100:3100"]

  promtail:
    image: grafana/promtail:3.2.0
    restart: unless-stopped
    networks: [agenticos]
    depends_on:
      loki: { condition: service_started }
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    volumes:
      - ./deploy/compose/promtail-config.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    networks: [agenticos]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/compose/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/compose/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3001:3000"]

  # ---------- AgenticOS services ----------
  api-gateway:
    <<: *svc-defaults
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE_PKG: api_gateway
        SERVICE_MODULE: api_gateway.main:app
    image: agenticos/api-gateway:dev
    environment:
      <<: *common-env
      PORT: "8080"
    ports: ["${API_GATEWAY_PORT:-8080}:8080"]

  agent-runtime:
    <<: *svc-defaults
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE_PKG: agent_runtime
        SERVICE_MODULE: agent_runtime.main:app
    image: agenticos/agent-runtime:dev
    environment:
      <<: *common-env
      PORT: "8082"
    ports: ["${AGENT_RUNTIME_PORT:-8082}:8082"]

  llm-gateway:
    <<: *svc-defaults
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE_PKG: llm_gateway
        SERVICE_MODULE: llm_gateway.main:app
    image: agenticos/llm-gateway:dev
    environment:
      <<: *common-env
      PORT: "8081"
    ports: ["${LLM_GATEWAY_PORT:-8081}:8081"]
    depends_on:
      ollama: { condition: service_started }

  tool-registry:
    <<: *svc-defaults
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE_PKG: tool_registry
        SERVICE_MODULE: tool_registry.main:app
    image: agenticos/tool-registry:dev
    environment:
      <<: *common-env
      PORT: "8083"
    ports: ["${TOOL_REGISTRY_PORT:-8083}:8083"]

  knowledge-svc:
    <<: *svc-defaults
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE_PKG: knowledge_svc
        SERVICE_MODULE: knowledge_svc.main:app
    image: agenticos/knowledge-svc:dev
    environment:
      <<: *common-env
      PORT: "8084"
    ports: ["${KNOWLEDGE_PORT:-8084}:8084"]

  memory-svc:
    <<: *svc-defaults
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE_PKG: memory_svc
        SERVICE_MODULE: memory_svc.main:app
    image: agenticos/memory-svc:dev
    environment:
      <<: *common-env
      PORT: "8085"
    ports: ["${MEMORY_PORT:-8085}:8085"]

  worker:
    <<: *svc-defaults
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        SERVICE_PKG: worker
        SERVICE_MODULE: worker.main:app
    image: agenticos/worker:dev
    environment:
      <<: *common-env
      PORT: "8086"
    # Run arq instead of uvicorn — overrides Dockerfile CMD.
    command: ["arq", "worker.main.WorkerSettings"]

  # ---------- Web UI ----------
  web-ui:
    image: node:22-alpine
    restart: unless-stopped
    networks: [agenticos]
    working_dir: /app
    volumes:
      - ./web-ui:/app
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    command: ["sh", "-c", "npm install --no-audit --no-fund && npm run dev -- -p 3000 -H 0.0.0.0"]
    ports: ["${WEB_UI_PORT:-3000}:3000"]

volumes:
  postgres-data:
  redis-data:
  minio-data:
  nats-data:
  ollama-data:
  grafana-data:
  loki-data:
  promtail-positions:

networks:
  agenticos:
    driver: bridge
